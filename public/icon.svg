<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#231b38" />
      <stop offset="60%" stop-color="#110d1c" />
      <stop offset="100%" stop-color="#0a0812" />
    </radialGradient>
    
    <!-- Neon Red Gradient for Logo -->
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3344" />
      <stop offset="50%" stop-color="#e50914" />
      <stop offset="100%" stop-color="#99000a" />
    </linearGradient>

    <!-- Neon Gold Gradient for Play Button -->
    <linearGradient id="neon-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Subtle Drop Shadows & Glows -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect width="496" height="496" x="8" y="8" rx="104" fill="none" stroke="#251f3b" stroke-width="4" opacity="0.4" />

  <!-- Outer Elegant Cinematic Circle Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#neon-red)" stroke-width="4" opacity="0.15" />
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#neon-red)" stroke-width="12" stroke-dasharray="12 6" opacity="0.3" />

  <!-- The "M" Logo (Styled like glowing film strips) -->
  <g filter="url(#glow-red)">
    <!-- Left Column Film Strip -->
    <path d="M 140,380 L 140,160 C 140,140 155,130 170,145 L 256,230 L 342,145 C 357,130 372,140 372,160 L 372,380 C 372,395 360,400 350,400 C 340,400 332,390 332,380 L 332,220 L 268,284 C 261,291 251,291 244,284 L 180,220 L 180,380 C 180,395 170,400 160,400 C 150,400 140,395 140,380 Z" 
          fill="url(#neon-red)" />
  </g>

  <!-- Centered Golden Play Button -->
  <g filter="url(#glow-gold)">
    <polygon points="236,220 286,256 236,292" fill="url(#neon-gold)" />
  </g>

  <!-- Film Strip Decorative Punch Holes (Left & Right margins) -->
  <g fill="#0a0812" opacity="0.8">
    <!-- Left Holes -->
    <rect x="150" y="180" width="10" height="15" rx="3" />
    <rect x="150" y="240" width="10" height="15" rx="3" />
    <rect x="150" y="300" width="10" height="15" rx="3" />
    <rect x="150" y="360" width="10" height="15" rx="3" />
    
    <!-- Right Holes -->
    <rect x="352" y="180" width="10" height="15" rx="3" />
    <rect x="352" y="240" width="10" height="15" rx="3" />
    <rect x="352" y="300" width="10" height="15" rx="3" />
    <rect x="352" y="360" width="10" height="15" rx="3" />
  </g>
</svg>
